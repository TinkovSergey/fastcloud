<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>FastCloud — Регистрация</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-left">
    <div class="auth-deco auth-deco-1"></div>
    <div class="auth-deco auth-deco-2"></div>
    <div class="auth-deco auth-deco-3"></div>
    <div class="auth-left-content">
      <div class="auth-left-body">
        <a href="index.html" class="logo logo-xl">
          <div class="logo-mark">FC</div>FastCloud
        </a>
        <div>
          <h1 class="auth-hero-title">Самые быстрые VPS в Европе.</h1>
          <p class="auth-hero-sub">Без карты для старта — попробуйте прямо сейчас.</p>
          <div class="auth-bonus">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            €5 на счёт после подтверждения e-mail
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="auth-right-inner">
    <div class="auth-form">
      <h2 class="fs-22 fw-7">Создать аккаунт</h2>
      <div class="form-group">
        <div><label>Имя</label><input class="inp" placeholder="Иван Петров" type="text"></div>
        <div><label>E-mail</label><input class="inp" placeholder="ivan@example.com" type="email"></div>
        <div><label>Пароль</label><input class="inp" placeholder="мин. 10 символов" type="password"></div>
        <div class="flex gap-2 items-center">
          <input type="checkbox" id="agree">
          <label for="agree" class="mb-0 cursor-pointer">Согласен с <a href="terms.html" class="c-accent">офертой</a> и <a href="privacy.html" class="c-accent">политикой</a></label>
        </div>
        <a href="dashboard.html" class="btn btn-primary jcc btn-block">Зарегистрироваться →</a>
      </div>
      <div class="flex items-center gap-2"><div class="divider flex-1"></div><span class="text-sm">или</span><div class="divider flex-1"></div></div>
      <div class="flex gap-2">
        <button class="btn btn-ghost jcc flex-1">Google</button>
        <button class="btn btn-ghost jcc flex-1">GitHub</button>
      </div>
      <div class="text-sm tac">Уже есть аккаунт? <a href="login.html" class="c-accent">Войти</a></div>
    </div>
  </div>
</div>
</body></html>
