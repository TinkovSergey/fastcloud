<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>FastCloud — Регистрация</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="lang-switcher" style="position:fixed;top:16px;right:20px;z-index:100"><button class="lang-btn" data-lang="ru">RU</button><button class="lang-btn" data-lang="en">EN</button><button class="lang-btn" data-lang="pt">PT</button></div>
<div class="auth-wrap">
  <div class="auth-left">
    <a href="index.html" class="logo" style="margin-bottom:32px"><div class="logo-mark">FC</div>FastCloud</a>
    <h1 style="font-size:28px;font-weight:800;line-height:1.2">Самые быстрые VPS в Европе.</h1>
    <p style="color:var(--text2);line-height:1.6">€5 на счёт после подтверждения e-mail. Без карты — попробовать можно прямо сейчас.</p>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">
      <div class="auth-feat">NVMe Gen4 · 10 Gbps</div>
      <div class="auth-feat">Развёртывание за 45 с</div>
      <div class="auth-feat">4 ДЦ: FRA · AMS · PAR · HEL</div>
      <div class="auth-feat">Оплата картой или USDT</div>
    </div>
  </div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:48px">
    <div style="width:100%;max-width:380px;display:flex;flex-direction:column;gap:20px">
      <h2 style="font-size:22px;font-weight:700">Создать аккаунт</h2>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div><label>Имя</label><input class="inp" placeholder="Иван Петров" type="text"></div>
        <div><label>E-mail</label><input class="inp" placeholder="ivan@example.com" type="email"></div>
        <div><label>Пароль</label><input class="inp" placeholder="мин. 10 символов" type="password"></div>
        <div class="flex gap-2 items-center"><input type="checkbox" id="agree"><label for="agree" style="margin:0;cursor:pointer">Согласен с <a href="terms.html" style="color:var(--accent)">офертой</a> и <a href="privacy.html" style="color:var(--accent)">политикой</a></label></div>
        <a href="dashboard.html" class="btn btn-primary" style="justify-content:center;padding:11px">Зарегистрироваться →</a>
      </div>
      <div class="flex items-center gap-2"><div class="divider flex-1"></div><span class="text-sm">или</span><div class="divider flex-1"></div></div>
      <div class="flex gap-2">
        <button class="btn btn-ghost" style="flex:1;justify-content:center">Google</button>
        <button class="btn btn-ghost" style="flex:1;justify-content:center">GitHub</button>
      </div>
      <div class="text-sm" style="text-align:center">Уже есть аккаунт? <a href="login.html" style="color:var(--accent)">Войти</a></div>
    </div>
  </div>
</div>
<script src="lang.js"></script>
</body></html>
