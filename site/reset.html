<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FastCloud — Восстановление пароля</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="width:380px;display:flex;flex-direction:column;gap:20px">
    <a href="index.html" class="logo" style="justify-content:center"><div class="logo-mark">FC</div>FastCloud</a>
    <div class="card">
      <h2 style="font-size:20px;font-weight:700;margin-bottom:6px">Восстановление пароля</h2>
      <p class="text-sm" style="margin-bottom:20px">Введите e-mail — пришлём ссылку для сброса.</p>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div><label>E-mail</label><input class="inp" placeholder="ivan@example.com" type="email"></div>
        <button class="btn btn-primary" style="justify-content:center;padding:11px">Отправить ссылку →</button>
      </div>
    </div>
    <div class="text-sm" style="text-align:center"><a href="login.html" style="color:var(--accent)">← Назад ко входу</a></div>
  </div>
</div></body></html>
