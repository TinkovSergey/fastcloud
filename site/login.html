<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FastCloud — Вход</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="auth-wrap">
  <div class="auth-left">
    <a href="index.html" class="logo" style="margin-bottom:32px"><div class="logo-mark">FC</div>FastCloud</a>
    <h1 style="font-size:28px;font-weight:800;line-height:1.2">С возвращением.</h1>
    <p style="color:var(--text2);line-height:1.6">Серверы готовы — баланс, графики и консоль ждут внутри.</p>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">
      <div class="auth-feat">NVMe Gen4 · 10 Gbps</div>
      <div class="auth-feat">Развёртывание за 45 с</div>
      <div class="auth-feat">4 ДЦ в Европе</div>
      <div class="auth-feat">Поддержка 24/7 на русском</div>
    </div>
  </div>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:48px">
    <div style="width:100%;max-width:380px;display:flex;flex-direction:column;gap:20px">
      <h2 style="font-size:22px;font-weight:700">Войти в аккаунт</h2>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div><label>E-mail</label><input class="inp" placeholder="vasya@example.com" type="email"></div>
        <div><div class="flex items-center mb-4" style="margin-bottom:5px"><label style="margin:0">Пароль</label><div class="flex-1"></div><a href="reset.html" style="font-size:12px;color:var(--accent)">Забыл?</a></div><input class="inp" placeholder="••••••••" type="password"></div>
        <a href="dashboard.html" class="btn btn-primary" style="justify-content:center;padding:11px">Войти →</a>
      </div>
      <div class="flex items-center gap-2"><div class="divider flex-1"></div><span class="text-sm">или</span><div class="divider flex-1"></div></div>
      <div class="flex gap-2">
        <button class="btn btn-ghost" style="flex:1;justify-content:center">Google</button>
        <button class="btn btn-ghost" style="flex:1;justify-content:center">GitHub</button>
        <button class="btn btn-ghost" style="flex:1;justify-content:center">Yandex</button>
      </div>
      <div class="text-sm" style="text-align:center">Нет аккаунта? <a href="register.html" style="color:var(--accent)">Зарегистрироваться</a></div>
    </div>
  </div>
</div></body></html>
