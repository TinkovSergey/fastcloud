<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>FastCloud — Вход</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-left">
    <div class="auth-deco auth-deco-1"></div>
    <div class="auth-deco auth-deco-2"></div>
    <div class="auth-deco auth-deco-3"></div>
    <div class="auth-left-content">
      <div class="auth-left-body">
        <a href="index.html" class="logo logo-xl">
          <div class="logo-mark">FC</div>FastCloud
        </a>
        <div>
          <h1 class="auth-hero-title">С возвращением.</h1>
          <p class="auth-hero-sub">Серверы готовы — баланс, графики и консоль ждут внутри.</p>
        </div>
      </div>
    </div>
  </div>

  <div class="auth-right-inner">
    <div class="auth-form">
      <h2 class="fs-22 fw-7">Войти в аккаунт</h2>
      <div class="form-group">
        <div><label>E-mail</label><input class="inp" placeholder="vasya@example.com" type="email"></div>
        <div>
          <div class="flex items-center mb-1">
            <label class="mb-0">Пароль</label>
            <div class="flex-1"></div>
            <a href="reset.html" class="fs-12 c-accent">Забыл?</a>
          </div>
          <input class="inp" placeholder="••••••••" type="password">
        </div>
        <a href="dashboard.html" class="btn btn-primary jcc btn-block">Войти →</a>
      </div>
      <div class="flex items-center gap-2"><div class="divider flex-1"></div><span class="text-sm">или</span><div class="divider flex-1"></div></div>
      <div class="flex gap-2">
        <button class="btn btn-ghost jcc flex-1">Google</button>
        <button class="btn btn-ghost jcc flex-1">GitHub</button>
        <button class="btn btn-ghost jcc flex-1">Yandex</button>
      </div>
      <div class="text-sm tac">Нет аккаунта? <a href="register.html" class="c-accent">Зарегистрироваться</a></div>
    </div>
  </div>
</div>
</body></html>
