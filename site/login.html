<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>FastCloud — Вход</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="base.css">
<link rel="stylesheet" href="marketing.css">
</head>
<body>

<div class="auth-split">
  <aside class="auth-side">
    <a href="index.html" class="logo logo-xl">
      <svg class="logo-svg" viewBox="0 0 110 24" xmlns="http://www.w3.org/2000/svg" aria-label="fastcloud"><text x="0" y="20" font-family="Instrument Serif, Georgia, serif" font-style="italic" font-size="25" font-weight="400" fill="#20b5eb">fast</text><text x="32" y="20" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="24" font-weight="700" letter-spacing="-1.3" fill="currentColor">cloud</text></svg>
    </a>

    <div class="auth-side-body">
      <div class="auth-side-eyebrow">login · fastcloud.eu</div>
      <h1 class="auth-side-title">С&nbsp;<em>возвращением.</em></h1>
      <p class="auth-side-sub">Серверы работают. Баланс, графики и&nbsp;консоль ждут внутри.</p>
    </div>

    <div class="auth-side-foot">
      <a href="terms.html">оферта</a><span>·</span>
      <a href="privacy.html">конфиденциальность</a><span>·</span>
      <a href="contacts.html">поддержка</a>
    </div>
  </aside>

  <main class="auth-pane">
    <div class="auth-card">
      <h2 class="auth-card-h">Войти в&nbsp;аккаунт</h2>

      <form class="auth-card-form" id="loginForm" novalidate>
        <label class="field" id="fieldEmail">
          <span>E‑mail</span>
          <input class="inp" type="email" placeholder="vasya@example.com" autocomplete="email" id="inputEmail">
          <span class="field-error" id="errEmail"></span>
        </label>
        <label class="field" id="fieldPass">
          <span class="field-label-row">Пароль <a href="reset.html">забыл</a></span>
          <input class="inp" type="password" placeholder="••••••••" autocomplete="current-password" id="inputPass">
          <span class="field-error" id="errPass"></span>
        </label>
        <button type="submit" class="btn btn-primary btn-block">Войти →</button>
      </form>

      <div class="auth-or"><span>или</span></div>
      <div class="auth-socials">
        <button class="btn btn-ghost auth-soc">Google</button>
        <button class="btn btn-ghost auth-soc">GitHub</button>
      </div>

      <p class="auth-foot">Нет аккаунта? <a href="register.html">Создать</a></p>
    </div>
  </main>
</div>

<script src="cookie.js"></script>
<script>
(function () {
  const form      = document.getElementById('loginForm');
  const emailInp  = document.getElementById('inputEmail');
  const passInp   = document.getElementById('inputPass');
  const fieldEmail = document.getElementById('fieldEmail');
  const fieldPass  = document.getElementById('fieldPass');
  const errEmail  = document.getElementById('errEmail');
  const errPass   = document.getElementById('errPass');

  function setError(field, errEl, msg) {
    field.classList.add('has-error');
    errEl.textContent = msg;
  }
  function clearError(field, errEl) {
    field.classList.remove('has-error');
    errEl.textContent = '';
  }

  emailInp.addEventListener('input', () => clearError(fieldEmail, errEmail));
  passInp.addEventListener('input',  () => clearError(fieldPass,  errPass));

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    let valid = true;

    const emailVal = emailInp.value.trim();
    const passVal  = passInp.value;

    if (!emailVal) {
      setError(fieldEmail, errEmail, 'введите e-mail');
      valid = false;
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
      setError(fieldEmail, errEmail, 'неверный формат e-mail');
      valid = false;
    } else {
      clearError(fieldEmail, errEmail);
    }

    if (!passVal) {
      setError(fieldPass, errPass, 'введите пароль');
      valid = false;
    } else if (passVal.length < 6) {
      setError(fieldPass, errPass, 'минимум 6 символов');
      valid = false;
    } else {
      clearError(fieldPass, errPass);
    }

    if (valid) location.href = 'dashboard.html';
  });
})();
</script>
</body></html>
